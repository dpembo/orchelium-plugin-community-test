<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Drive/disk base -->
  <rect x="8" y="28" width="32" height="12" rx="3"
        fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2"/>
  <!-- Drive activity LED -->
  <circle cx="36" cy="34" r="2" fill="#AB47BC"/>
  <!-- Upward mount arrow -->
  <line x1="24" y1="26" x2="24" y2="10" stroke="#6A1B9A" stroke-width="2.4" stroke-linecap="round"/>
  <polygon points="24,8 19,16 29,16" fill="#6A1B9A"/>
  <!-- Horizontal bar at top (mount point / folder line) -->
  <line x1="14" y1="8" x2="34" y2="8" stroke="#6A1B9A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Label -->
  <text x="24" y="47" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#6A1B9A">mount</text>
</svg>
